<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TikTok authorization — Builder's Eye Analytics</title>
<style>
  :root { color-scheme: light dark; }
  body { max-width: 640px; margin: 3rem auto; padding: 0 1.25rem;
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1c1c1e; background: #fff; }
  @media (prefers-color-scheme: dark){ body{ color:#e7e7ea; background:#15151a; } textarea{ background:#222; color:#eee; border-color:#444; } }
  h1 { font-size: 1.4rem; }
  textarea { width: 100%; height: 5.5rem; font-family: ui-monospace, Menlo, monospace; font-size: .85rem;
    padding: .6rem; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
  button { margin-top: .75rem; padding: .55rem 1rem; font-size: 1rem; border: 0; border-radius: 8px;
    background: #2563eb; color: #fff; cursor: pointer; }
  .muted { color: #888; font-size: .85rem; }
  .err { color: #c0392b; }
</style>
</head>
<body>
  <h1>TikTok authorization</h1>
  <div id="out"><p class="muted">Reading the redirect…</p></div>
<script>
  var p = new URLSearchParams(location.search);
  var code = p.get('code'), state = p.get('state'), err = p.get('error');
  var out = document.getElementById('out');
  if (err) {
    out.innerHTML = '<p class="err">Authorization failed: ' + err + '</p><p class="muted">' +
      (p.get('error_description') || '') + '</p>';
  } else if (code) {
    out.innerHTML =
      '<p>✅ Authorized. Copy the value below and paste it back to continue connecting:</p>' +
      '<textarea id="v" readonly>' + location.href + '</textarea>' +
      '<button id="c">Copy</button>' +
      '<p class="muted">Contains a single-use code &amp; state — expires in a few minutes.</p>';
    document.getElementById('c').onclick = function () {
      var t = document.getElementById('v'); t.select();
      navigator.clipboard.writeText(t.value); this.textContent = 'Copied ✓';
    };
  } else {
    out.innerHTML = '<p class="muted">No code in the URL yet — this page is the TikTok OAuth redirect target.</p>';
  }
</script>
</body>
</html>
